name: Daily ETL

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      quick_preset:
        description: "Chọn nhanh chế độ chạy ETL; chọn custom để tự nhập run_type và giới hạn bên dưới"
        required: false
        default: "Demo daily - 2 quận"
        type: choice
        options:
          - "Demo daily - 2 quận"
          - "Demo hourly - 2 quận"
          - "Demo AQI hourly - 2 quận"
          - "Chạy thật daily - toàn bộ quận"
          - "Chạy thật hourly - toàn bộ quận"
          - "Chạy thật AQI hourly - toàn bộ quận"
          - custom
      run_type:
        description: "Tùy chỉnh: loại ETL cần chạy khi quick_preset=custom; mặc định incremental-daily cho demo ngắn an toàn"
        required: false
        default: "incremental-daily"
        type: choice
        options:
          - incremental-daily
          - incremental-hourly
          - incremental-aqi-hourly
          - historical-daily
          - historical-hourly
          - historical-aqi-hourly
          - forecast-daily
          - forecast-hourly
          - forecast-aqi-hourly
      demo_mode:
        description: "Tùy chỉnh: bật demo nhỏ; tự giới hạn 2 quận và delay 0 nếu không nhập giới hạn khác"
        required: false
        default: false
        type: boolean
      district_ids:
        description: "Tùy chỉnh: ID quận/huyện cho manual/demo, cách nhau bằng dấu phẩy. Ví dụ: 1,2"
        required: false
        default: ""
        type: string
      max_districts:
        description: "Tùy chỉnh: giới hạn N quận đầu tiên khi district_ids để trống. Ví dụ: 2"
        required: false
        default: ""
        type: string
      start_date:
        description: "Tùy chỉnh: ngày bắt đầu YYYY-MM-DD; để trống sẽ dùng mặc định theo run_type"
        required: false
        default: ""
        type: string
      end_date:
        description: "Tùy chỉnh: ngày kết thúc YYYY-MM-DD; để trống sẽ dùng mặc định theo run_type"
        required: false
        default: ""
        type: string
      request_delay_seconds:
        description: "Tùy chỉnh: số giây nghỉ giữa request API mỗi quận/huyện. Demo có thể dùng 0"
        required: false
        default: ""
        type: string

concurrency:
  group: etl-${{ github.ref }}
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DISCORD_NOTIFICATIONS_ENABLED: ${{ vars.DISCORD_NOTIFICATIONS_ENABLED || 'true' }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Record workflow start time
        run: echo "WORKFLOW_STARTED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest --cov=src --cov-report=term-missing

      - name: Run migrations
        run: poetry run alembic upgrade head

      - name: Seed districts
        run: poetry run python scripts/seed_provinces.py

      - name: Seed date dimension
        run: poetry run python scripts/seed_dim_date.py

      - name: Run ETL (scheduled - daily)
        if: github.event_name == 'schedule'
        run: poetry run vwdp-etl --run-type incremental-daily

      - name: Run ETL (scheduled - hourly)
        if: github.event_name == 'schedule'
        run: poetry run vwdp-etl --run-type incremental-hourly

      - name: Run ETL (scheduled - AQI hourly)
        if: github.event_name == 'schedule'
        run: poetry run vwdp-etl --run-type incremental-aqi-hourly

      - name: Run ETL (manual/demo)
        if: github.event_name == 'workflow_dispatch'
        env:
          QUICK_PRESET: ${{ inputs.quick_preset }}
          RUN_TYPE: ${{ inputs.run_type }}
          DEMO_MODE: ${{ inputs.demo_mode }}
          DISTRICT_IDS: ${{ inputs.district_ids }}
          MAX_DISTRICTS: ${{ inputs.max_districts }}
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
          REQUEST_DELAY_SECONDS: ${{ inputs.request_delay_seconds }}
        run: |
          case "$QUICK_PRESET" in
            "Demo daily - 2 quận"|demo-daily-2-districts)
              RUN_TYPE="incremental-daily"
              DEMO_MODE="true"
              MAX_DISTRICTS="${MAX_DISTRICTS:-2}"
              REQUEST_DELAY_SECONDS="${REQUEST_DELAY_SECONDS:-0}"
              ;;
            "Demo hourly - 2 quận"|demo-hourly-2-districts)
              RUN_TYPE="incremental-hourly"
              DEMO_MODE="true"
              MAX_DISTRICTS="${MAX_DISTRICTS:-2}"
              REQUEST_DELAY_SECONDS="${REQUEST_DELAY_SECONDS:-0}"
              ;;
            "Demo AQI hourly - 2 quận"|demo-aqi-2-districts)
              RUN_TYPE="incremental-aqi-hourly"
              DEMO_MODE="true"
              MAX_DISTRICTS="${MAX_DISTRICTS:-2}"
              REQUEST_DELAY_SECONDS="${REQUEST_DELAY_SECONDS:-0}"
              ;;
            "Chạy thật daily - toàn bộ quận"|full-incremental-daily)
              RUN_TYPE="incremental-daily"
              DEMO_MODE="false"
              DISTRICT_IDS=""
              MAX_DISTRICTS=""
              ;;
            "Chạy thật hourly - toàn bộ quận"|full-incremental-hourly)
              RUN_TYPE="incremental-hourly"
              DEMO_MODE="false"
              DISTRICT_IDS=""
              MAX_DISTRICTS=""
              ;;
            "Chạy thật AQI hourly - toàn bộ quận"|full-incremental-aqi-hourly)
              RUN_TYPE="incremental-aqi-hourly"
              DEMO_MODE="false"
              DISTRICT_IDS=""
              MAX_DISTRICTS=""
              ;;
            custom|"")
              ;;
            *)
              echo "Unknown quick_preset: $QUICK_PRESET" >&2
              exit 1
              ;;
          esac

          args=(--run-type "$RUN_TYPE")

          if [ -n "$START_DATE" ]; then
            args+=(--start-date "$START_DATE")
          fi
          if [ -n "$END_DATE" ]; then
            args+=(--end-date "$END_DATE")
          fi

          if [ -n "$DISTRICT_IDS" ]; then
            IFS=',' read -ra ids <<< "$DISTRICT_IDS"
            for id in "${ids[@]}"; do
              id="$(echo "$id" | xargs)"
              if [ -n "$id" ]; then
                args+=(--district-id "$id")
              fi
            done
          elif [ -n "$MAX_DISTRICTS" ]; then
            args+=(--max-districts "$MAX_DISTRICTS")
          elif [ "$DEMO_MODE" = "true" ]; then
            args+=(--max-districts 2)
          fi

          if [ -n "$REQUEST_DELAY_SECONDS" ]; then
            args+=(--request-delay-seconds "$REQUEST_DELAY_SECONDS")
          elif [ "$DEMO_MODE" = "true" ]; then
            args+=(--request-delay-seconds 0)
          fi

          poetry run vwdp-etl "${args[@]}"

      - name: Build ETL summary and notify Discord
        if: always()
        env:
          JOB_STATUS: ${{ job.status }}
        run: poetry run python scripts/github_actions_etl_report.py --job-status "$JOB_STATUS" --notify-discord
        continue-on-error: true
