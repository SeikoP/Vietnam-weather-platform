name: Daily ETL

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
    inputs:
      run_type:
        description: "ETL run type"
        required: false
        default: "incremental-daily"
        type: choice
        options:
          - incremental-daily
          - incremental-hourly
          - incremental-aqi-hourly
          - historical-daily
          - historical-hourly
          - historical-aqi-hourly
          - forecast-daily
          - forecast-hourly
          - forecast-aqi-hourly
      demo_mode:
        description: "Run a short demo-safe ETL"
        required: false
        default: false
        type: boolean
      district_ids:
        description: "Comma-separated district ids for manual/demo runs"
        required: false
        default: ""
        type: string
      max_districts:
        description: "Limit to first N districts when district_ids is empty"
        required: false
        default: ""
        type: string
      start_date:
        description: "Optional YYYY-MM-DD start date"
        required: false
        default: ""
        type: string
      end_date:
        description: "Optional YYYY-MM-DD end date"
        required: false
        default: ""
        type: string
      request_delay_seconds:
        description: "Override delay between district API requests"
        required: false
        default: ""
        type: string

concurrency:
  group: etl-${{ github.ref }}
  cancel-in-progress: false

jobs:
  etl:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DISCORD_NOTIFICATIONS_ENABLED: "false"
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run pytest --cov=src --cov-report=term-missing

      - name: Run migrations
        run: poetry run alembic upgrade head

      - name: Seed districts
        run: poetry run python scripts/seed_provinces.py

      - name: Seed date dimension
        run: poetry run python scripts/seed_dim_date.py

      - name: Run ETL (scheduled — daily)
        if: github.event_name == 'schedule'
        run: poetry run vwdp-etl --run-type incremental-daily

      - name: Run ETL (scheduled — hourly)
        if: github.event_name == 'schedule'
        run: poetry run vwdp-etl --run-type incremental-hourly

      - name: Run ETL (scheduled — AQI hourly)
        if: github.event_name == 'schedule'
        run: poetry run vwdp-etl --run-type incremental-aqi-hourly

      - name: Run ETL (manual/demo)
        if: github.event_name == 'workflow_dispatch'
        env:
          RUN_TYPE: ${{ inputs.run_type }}
          DEMO_MODE: ${{ inputs.demo_mode }}
          DISTRICT_IDS: ${{ inputs.district_ids }}
          MAX_DISTRICTS: ${{ inputs.max_districts }}
          START_DATE: ${{ inputs.start_date }}
          END_DATE: ${{ inputs.end_date }}
          REQUEST_DELAY_SECONDS: ${{ inputs.request_delay_seconds }}
        run: |
          args=(--run-type "$RUN_TYPE")

          if [ -n "$START_DATE" ]; then
            args+=(--start-date "$START_DATE")
          fi
          if [ -n "$END_DATE" ]; then
            args+=(--end-date "$END_DATE")
          fi

          if [ -n "$DISTRICT_IDS" ]; then
            IFS=',' read -ra ids <<< "$DISTRICT_IDS"
            for id in "${ids[@]}"; do
              id="$(echo "$id" | xargs)"
              if [ -n "$id" ]; then
                args+=(--district-id "$id")
              fi
            done
          elif [ -n "$MAX_DISTRICTS" ]; then
            args+=(--max-districts "$MAX_DISTRICTS")
          elif [ "$DEMO_MODE" = "true" ]; then
            args+=(--max-districts 2)
          fi

          if [ -n "$REQUEST_DELAY_SECONDS" ]; then
            args+=(--request-delay-seconds "$REQUEST_DELAY_SECONDS")
          elif [ "$DEMO_MODE" = "true" ]; then
            args+=(--request-delay-seconds 0)
          fi

          poetry run vwdp-etl "${args[@]}"

      - name: Notify Discord on failure
        if: failure() && env.DISCORD_NOTIFICATIONS_ENABLED == 'true'
        run: |
          python - <<'PY'
          import os, requests
          webhook = os.environ.get("DISCORD_WEBHOOK_URL")
          if webhook:
              requests.post(
                  webhook,
                  json={"content": "VWDP Daily ETL failed. Check GitHub Actions logs."},
                  timeout=10,
              ).raise_for_status()
          PY
